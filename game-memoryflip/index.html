<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶翻牌挑戰賽</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --card-back: #2c3e50; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { max-width: 400px; width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #666; font-size: 14px; }
        
        /* 遊戲網格 */
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .card { height: 70px; background: var(--card-back); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: transparent; cursor: pointer; transition: transform 0.3s, background 0.3s; user-select: none; }
        .card.flipped { background: #ecf0f1; color: #333; transform: rotateY(180deg); }
        .card.matched { background: var(--line-green); color: white; cursor: default; }

        /* 排行榜 */
        #leaderboard-section { margin-top: 25px; display: none; border-top: 2px solid #eee; padding-top: 15px; text-align: left; }
        .rank-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .rank-number { width: 30px; font-weight: bold; color: var(--line-green); }
        .rank-name { flex: 1; }
        .rank-score { font-weight: bold; color: #e67e22; }
        .my-rank { background: #fff9db !important; border-radius: 5px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--line-green); color: white; }
        .btn-share { background: #3b5998; color: white; }
        .flow-notice { display: none; margin: 8px 0 2px; font-size: 12px; color: #666; text-align: left; }
        .share-status {
            margin: 8px 0 2px;
            padding: 8px 10px;
            border-radius: 8px;
            background: #fff4cc;
            color: #5d4300;
            font-size: 12px;
            text-align: left;
            border: 1px solid #f1d37a;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧩 記憶翻牌</h2>
    
    <div class="status-bar">
        <div>玩家: <span id="user-name">載入中...</span></div>
        <div>步數: <span id="move-count">0</span></div>
    </div>

    <div class="share-status" id="share-status">分享狀態：尚未觸發（build: memory-20260329-2）</div>

    <div class="flow-notice" id="flow-notice"></div>

    <div class="game-grid" id="game-grid">
        <!-- 卡牌由 JS 動態生成 -->
    </div>

    <div id="leaderboard-section">
        <h3 style="text-align: center;">🏆 本群 TOP 5</h3>
        <div id="rank-list"></div>
        <button class="btn btn-share" onclick="shareResult()">分享戰績到 LINE</button>
        <button class="btn" style="background:#eee" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
    // --- 配置區 ---
    const LIFF_ID = "2009635482-zInmjHOw"; 
    const API_URL = "https://cloudson.asuscomm.com:10666/submitscore"; 

    let moves = 0;
    let flippedCards = [];
    let matchedCount = 0;
    let isProcessing = false;
    let gameFinished = false;
    let userProfile = null;
    let liffContext = null;

    // --- 1. 初始化 LIFF ---
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                userProfile = await liff.getProfile();
                liffContext = liff.getContext();
                document.getElementById('user-name').innerText = userProfile.displayName;
                createBoard();
            }
        } catch (err) { console.error("LIFF Init Failed", err); }
    }

    // --- 2. 遊戲邏輯 ---
    const emojis = ['🍎', '🍎', '🍌', '🍌', '🍇', '🍇', '🍓', '🍓', '🍒', '🍒', '🍍', '🍍', '🥝', '🥝', '🍉', '🍉'];

    function createBoard() {
        const grid = document.getElementById('game-grid');
        const shuffled = emojis.sort(() => Math.random() - 0.5);
        
        shuffled.forEach((emoji, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.value = emoji;
            card.dataset.index = index;
            card.innerText = emoji;
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (isProcessing || card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('move-count').innerText = moves;
            checkMatch();
        }
    }

    function checkMatch() {
        isProcessing = true;
        const [c1, c2] = flippedCards;

        if (c1.dataset.value === c2.dataset.value) {
            c1.classList.add('matched');
            c2.classList.add('matched');
            matchedCount += 2;
            flippedCards = [];
            isProcessing = false;
            if (matchedCount === emojis.length) finishGameFlow();
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                flippedCards = [];
                isProcessing = false;
            }, 800);
        }
    }

    function showFlowNotice(msg) {
        const notice = document.getElementById('flow-notice');
        notice.innerText = msg;
        notice.style.display = 'block';
        document.getElementById('share-status').innerText = `分享狀態：${msg}（build: memory-20260329-2）`;
    }

    // --- 3. 處理勝利與上傳 ---
    function buildShareText() {
        return [
            '==== 🧩 記憶翻牌挑戰賽 ==== ',
            `玩家｜${userProfile?.displayName || '玩家'}`,
            `成績｜${moves} 步`,
            '結果｜完成配對 ✅',
            '',
            '我剛通關，來挑戰我的步數！',
            '#LIFFGameLobby'
        ].join('\n');
    }

    function buildShareFlexMessage() {
        return {
            type: 'flex',
            altText: `🧩 翻牌戰績｜${userProfile?.displayName || '玩家'}｜${moves} 步`,
            contents: {
                type: 'bubble',
                body: {
                    type: 'box',
                    layout: 'vertical',
                    spacing: 'md',
                    contents: [
                        { type: 'text', text: '🏆 翻牌大賽結算', weight: 'bold', size: 'xl', color: '#00B900' },
                        { type: 'text', text: `玩家：${userProfile?.displayName || '玩家'}`, size: 'md', color: '#333333' },
                        { type: 'text', text: `成績：${moves} 步完成`, weight: 'bold', size: 'xl', color: '#1F2D3D' }
                    ]
                },
                footer: {
                    type: 'box',
                    layout: 'vertical',
                    contents: [
                        {
                            type: 'button',
                            style: 'primary',
                            color: '#00B900',
                            action: {
                                type: 'uri',
                                label: '挑戰他！',
                                uri: `https://liff.line.me/${LIFF_ID}`
                            }
                        }
                    ]
                }
            }
        };
    }

    async function trySendResultMessage() {
        if (!userProfile) return { ok: false, reason: '尚未登入 LINE，無法自動分享。' };
        if (typeof liff === 'undefined') return { ok: false, reason: 'LIFF SDK 未載入。' };
        if (!liff.isInClient()) return { ok: false, reason: '請在 LINE App 內開啟，才可自動分享。' };
        if (typeof liff.sendMessages !== 'function') {
            return { ok: false, reason: '目前聊天情境不支援自動分享，請按下方按鈕手動分享。' };
        }
        try {
            try {
                await liff.sendMessages([buildShareFlexMessage()]);
                return { ok: true };
            } catch (flexErr) {
                console.warn('Flex 自動分享失敗，改送文字', flexErr);
                await liff.sendMessages([{ type: 'text', text: buildShareText() }]);
                return { ok: true };
            }
        } catch (err) {
            const detail = err?.message ? `（${err.message}）` : '';
            console.warn('sendMessages 失敗', err);
            return { ok: false, reason: `自動分享失敗${detail}，請按下方按鈕手動分享。` };
        }
    }

    async function finishGameFlow() {
        if (gameFinished) return;
        gameFinished = true;
        showFlowNotice('結算中：正在嘗試自動分享...');
        let shareResult;
        try {
            shareResult = await Promise.race([
                trySendResultMessage(),
                new Promise(resolve => setTimeout(() => resolve({ ok: false, reason: '分享逾時，已略過自動分享。' }), 3500))
            ]);
        } catch (err) {
            console.warn('分享流程例外', err);
            shareResult = { ok: false, reason: '分享流程異常，已略過自動分享。' };
        }

        if (!shareResult.ok) {
            showFlowNotice(`自動分享未送出：${shareResult.reason}`);
        } else {
            showFlowNotice('已自動分享戰績到 LINE。');
        }
        await handleWin();
    }

    async function handleWin() {
        const scoreData = {
            gameType: "memory_flip",
            groupId: liffContext.groupId || "personal_chat",
            userId: userProfile.userId,
            userName: userProfile.displayName,
            score: moves,
            isAscending: true,
            extraData: JSON.stringify({ time: new Date().toISOString() })
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(scoreData)
            });
            const result = await response.json();
            if (result.success) renderLeaderboard(result.data);
        } catch (error) {
            alert("上傳失敗，請檢查 API 連線");
        }
    }

    // --- 4. 渲染排行榜 ---
    function renderLeaderboard(data) {
        const listContainer = document.getElementById('rank-list');
        listContainer.innerHTML = data.map(item => `
            <div class="rank-item ${item.userName === userProfile.displayName ? 'my-rank' : ''}">
                <div class="rank-number">${item.rank}</div>
                <div class="rank-name">${item.userName}</div>
                <div class="rank-score">${item.score} 步</div>
            </div>
        `).join('');
        document.getElementById('leaderboard-section').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    async function shareResult() {
        if (!userProfile) {
            alert('尚未登入 LINE，無法分享。');
            return;
        }

        try {
            if (typeof liff !== 'undefined' && liff.isInClient() && typeof liff.sendMessages === 'function') {
                try {
                    await liff.sendMessages([buildShareFlexMessage()]);
                } catch (flexErr) {
                    console.warn('手動 Flex 失敗，改送文字', flexErr);
                    await liff.sendMessages([{ type: 'text', text: buildShareText() }]);
                }
                showFlowNotice('已手動分享戰績到 LINE。');
                return;
            }
        } catch (err) {
            console.warn('手動 sendMessages 失敗', err);
        }

        try {
            if (typeof liff !== 'undefined' && typeof liff.shareTargetPicker === 'function') {
                let picked;
                try {
                    picked = await liff.shareTargetPicker([buildShareFlexMessage()]);
                } catch (flexErr) {
                    console.warn('shareTargetPicker Flex 失敗，改送文字', flexErr);
                    picked = await liff.shareTargetPicker([{ type: 'text', text: buildShareText() }]);
                }
                if (picked === false) {
                    alert('你已取消分享。');
                    return;
                }
                showFlowNotice('已手動分享戰績到 LINE。');
                return;
            }
        } catch (err) {
            const detail = err?.message ? `（${err.message}）` : '';
            alert(`手動分享失敗${detail}`);
            return;
        }

        alert('目前環境不支援分享，請在 LINE App 內開啟。');
    }

    initLiff();
</script>
</body>
</html>
