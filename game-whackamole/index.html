<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>打地鼠挑戰賽</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --bg: #f4f7f6; --panel: #ffffff; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            padding: 18px;
            text-align: center;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0 14px;
            font-size: 14px;
            color: #555;
            gap: 10px;
        }
        .pill {
            background: #eef7ee;
            color: #2f6b2f;
            border-radius: 999px;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 13px;
        }
        .difficulty-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 6px 0 8px;
        }
        .difficulty-btn {
            border: 1px solid #d8e6d8;
            background: #f7fbf7;
            border-radius: 10px;
            padding: 8px 6px;
            font-size: 13px;
            color: #466046;
            font-weight: bold;
            cursor: pointer;
        }
        .difficulty-btn.active {
            border-color: #00b900;
            background: #e8f8e8;
            color: #0a5f0a;
        }
        .mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 8px;
        }
        .hole {
            border: none;
            border-radius: 14px;
            aspect-ratio: 1;
            background: #d8e6d8;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.08s, background 0.08s;
        }
        .hole:active { transform: scale(0.96); }
        .hole::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: #7f8c8d;
            opacity: 0.35;
        }
        .hole.active {
            background: #fff5d8;
            box-shadow: inset 0 0 0 2px #ffd166;
        }
        .hole.active.rabbit {
            background: #ffe6e6;
            box-shadow: inset 0 0 0 2px #ff8a8a;
        }
        .hole.active::after {
            content: "🐹";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 34px;
        }
        .hole.active.rabbit::after { content: "🐰"; }

        .overlay {
            margin-top: 14px;
            background: #f8fbf8;
            border: 1px solid #e6efe6;
            border-radius: 12px;
            padding: 14px;
            display: none;
        }

        #leaderboard-section {
            margin-top: 20px;
            display: none;
            text-align: left;
            border-top: 2px solid #eee;
            padding-top: 14px;
        }
        .rank-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .rank-number { width: 30px; font-weight: bold; color: var(--line-green); }
        .rank-name { flex: 1; }
        .rank-score { font-weight: bold; color: #e67e22; }
        .my-rank { background: #fff9db !important; border-radius: 6px; }

        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-primary { background: var(--line-green); color: white; font-weight: bold; }
        .btn-share { background: #3b5998; color: white; }
        .btn-lobby { background: #ecf0f1; color: #555; }
        .hint { color: #888; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔨 打地鼠</h2>

    <div class="status-row">
        <div>玩家：<strong id="user-name">載入中...</strong></div>
        <div class="pill">剩餘：<span id="time">30</span>s</div>
        <div class="pill">分數：<span id="score">0</span></div>
    </div>

    <div class="difficulty-row">
        <button class="difficulty-btn active" id="diff-easy" onclick="setDifficulty('easy')">簡單（慢）</button>
        <button class="difficulty-btn" id="diff-medium" onclick="setDifficulty('medium')">中等（快）</button>
        <button class="difficulty-btn" id="diff-hard" onclick="setDifficulty('hard')">困難（快+兔）</button>
    </div>

    <button class="btn btn-primary" id="start-btn" onclick="startGame()">開始遊戲</button>
    <p class="hint">30 秒內盡量多打到地鼠，困難模式打到兔子會扣 1 分（最低 0 分）</p>

    <div class="mole-grid" id="mole-grid"></div>

    <div class="overlay" id="result-overlay">
        <h3 style="margin:0 0 6px;">⏰ 回合結束</h3>
        <p style="margin:0;color:#555;">本局分數：<strong id="final-score">0</strong> 分</p>
        <button class="btn btn-primary" onclick="startGame()">再玩一次</button>
    </div>

    <div id="leaderboard-section">
        <h3 style="text-align:center;">🏆 本群 TOP 5</h3>
        <div id="rank-list"></div>
        <button class="btn btn-share" onclick="shareResult()">分享戰績到 LINE</button>
        <button class="btn btn-primary" onclick="startGame()">重新開始</button>
        <button class="btn btn-lobby" onclick="window.location.href='../'">← 返回大廳</button>
    </div>
</div>

<script>
    const LIFF_ID = "2009635482-zInmjHOw";
    const API_URL = "https://cloudson.asuscomm.com:10666/submitscore";
    const GAME_TIME = 30;

    let userProfile = null;
    let liffContext = null;

    let score = 0;
    let remain = GAME_TIME;
    let activeIndex = -1;
    let activeType = 'mole';
    let isRunning = false;
    let timerId = null;
    let moleId = null;
    let submitted = false;
    let difficulty = 'easy';

    const DIFFICULTY_CONFIG = {
        easy:   { interval: 900, rabbitChance: 0 },
        medium: { interval: 520, rabbitChance: 0 },
        hard:   { interval: 520, rabbitChance: 0.28 }
    };

    function buildGrid() {
        const grid = document.getElementById('mole-grid');
        grid.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'hole';
            btn.dataset.index = i;
            btn.addEventListener('click', () => hitMole(i));
            grid.appendChild(btn);
        }
    }

    function setActiveHole(nextIndex, type) {
        const holes = Array.from(document.querySelectorAll('.hole'));
        holes.forEach(h => h.classList.remove('active', 'rabbit'));
        activeIndex = nextIndex;
        activeType = type || 'mole';
        if (activeIndex >= 0) {
            holes[activeIndex].classList.add('active');
            if (activeType === 'rabbit') holes[activeIndex].classList.add('rabbit');
        }
    }

    function setDifficulty(next) {
        if (!DIFFICULTY_CONFIG[next]) return;
        if (isRunning) {
            showFlowNotice('進行中無法切換，請本局結束後再選難度。');
            return;
        }
        difficulty = next;
        ['easy', 'medium', 'hard'].forEach(key => {
            const btn = document.getElementById(`diff-${key}`);
            if (btn) btn.classList.toggle('active', key === difficulty);
        });
    }

    function tickMole() {
        if (!isRunning) return;
        const next = Math.floor(Math.random() * 9);
        const rabbitChance = DIFFICULTY_CONFIG[difficulty].rabbitChance;
        const nextType = Math.random() < rabbitChance ? 'rabbit' : 'mole';
        setActiveHole(next, nextType);
    }

    function hitMole(index) {
        if (!isRunning) return;
        if (index !== activeIndex) return;
        if (activeType === 'rabbit') {
            score = Math.max(0, score - 1);
        } else {
            score += 1;
        }
        document.getElementById('score').innerText = score;
        setActiveHole(-1, 'mole');
        setTimeout(tickMole, 60);
    }

    function startGame() {
        submitted = false;
        isRunning = true;
        score = 0;
        remain = GAME_TIME;
        document.getElementById('score').innerText = score;
        document.getElementById('time').innerText = remain;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('leaderboard-section').style.display = 'none';
        const toast = document.getElementById('flow-toast');
        if (toast) toast.style.display = 'none';

        if (timerId) clearInterval(timerId);
        if (moleId) clearInterval(moleId);

        tickMole();
        moleId = setInterval(tickMole, DIFFICULTY_CONFIG[difficulty].interval);
        timerId = setInterval(() => {
            remain -= 1;
            document.getElementById('time').innerText = remain;
            if (remain <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        if (!isRunning) return;
        isRunning = false;
        clearInterval(timerId);
        clearInterval(moleId);
        setActiveHole(-1, 'mole');
        document.getElementById('final-score').innerText = score;
        document.getElementById('result-overlay').style.display = 'block';
        submitScore();
    }

    function buildShareText() {
        const diffLabelMap = { easy: '簡單', medium: '中等', hard: '困難' };
        return [
            '==== 🔨 打地鼠挑戰賽 ==== ',
            `玩家｜${userProfile?.displayName || '玩家'}`,
            `難度｜${diffLabelMap[difficulty] || '簡單'}`,
            `得分｜${score} 分`,
            '',
            '我剛完成一局，來挑戰我的反應速度！',
            '#LIFFGameLobby'
        ].join('\n');
    }

    function buildShareFlexMessage() {
        const diffLabelMap = { easy: '簡單', medium: '中等', hard: '困難' };
        return {
            type: 'flex',
            altText: `🔨 打地鼠戰績｜${userProfile?.displayName || '玩家'}｜${score} 分`,
            contents: {
                type: 'bubble',
                body: {
                    type: 'box',
                    layout: 'vertical',
                    spacing: 'md',
                    contents: [
                        { type: 'text', text: '🏆 打地鼠大賽結算', weight: 'bold', size: 'xl', color: '#00B900' },
                        { type: 'text', text: `玩家：${userProfile?.displayName || '玩家'}`, size: 'md', color: '#333333' },
                        { type: 'text', text: `成績：${score} 分`, weight: 'bold', size: 'xl', color: '#1F2D3D' },
                        { type: 'text', text: `難度：${diffLabelMap[difficulty] || '簡單'}`, size: 'sm', color: '#555555' }
                    ]
                },
                footer: {
                    type: 'box',
                    layout: 'vertical',
                    contents: [
                        {
                            type: 'button',
                            style: 'primary',
                            color: '#00B900',
                            action: {
                                type: 'uri',
                                label: '挑戰他！',
                                uri: `https://liff.line.me/${LIFF_ID}`
                            }
                        }
                    ]
                }
            }
        };
    }

    function showFlowNotice(msg) {
        let notice = document.getElementById('flow-toast');
        if (!notice) {
            notice = document.createElement('div');
            notice.id = 'flow-toast';
            notice.style.margin = '8px 0 2px';
            notice.style.fontSize = '12px';
            notice.style.color = '#666';
            notice.style.textAlign = 'left';
            document.querySelector('.container').insertBefore(notice, document.getElementById('mole-grid'));
        }
        notice.innerText = msg;
        notice.style.display = 'block';
        clearTimeout(showFlowNotice._timer);
        showFlowNotice._timer = setTimeout(() => { notice.style.display = 'none'; }, 2600);
    }

    async function trySendResultMessage() {
        try {
            if (!userProfile) return { ok: false, reason: '尚未登入 LINE，無法自動分享。' };
            if (typeof liff === 'undefined') return { ok: false, reason: 'LIFF SDK 未載入。' };
            if (!liff.isInClient()) return { ok: false, reason: '請在 LINE App 內開啟。' };
            if (typeof liff.sendMessages !== 'function') return { ok: false, reason: '此情境不支援自動分享。' };
            try {
                await liff.sendMessages([buildShareFlexMessage()]);
                return { ok: true };
            } catch (flexErr) {
                console.warn('Flex 自動分享失敗，改送文字', flexErr);
                await liff.sendMessages([{ type: 'text', text: buildShareText() }]);
                return { ok: true };
            }
        } catch (err) {
            const detail = err?.message ? `（${err.message}）` : '';
            return { ok: false, reason: `自動分享失敗${detail}` };
        }
    }

    async function submitScore() {
        if (submitted || !userProfile) return;
        submitted = true;
        showFlowNotice('結算中：正在嘗試自動分享...');
        const diffLabelMap = { easy: '簡單', medium: '中等', hard: '困難' };

        let shareResult;
        try {
            shareResult = await Promise.race([
                trySendResultMessage(),
                new Promise(resolve => setTimeout(() => resolve({ ok: false, reason: '分享逾時，已略過自動分享。' }), 3500))
            ]);
        } catch (err) {
            const detail = err?.message ? `（${err.message}）` : '';
            shareResult = { ok: false, reason: `分享流程異常${detail}，已略過自動分享。` };
        }

        if (!shareResult.ok) {
            showFlowNotice(`自動分享未送出：${shareResult.reason}`);
        } else {
            showFlowNotice('已自動分享戰績到 LINE。');
        }

        const payload = {
            gameType: "whack_a_mole",
            groupId: liffContext?.groupId || "personal_chat",
            userId: userProfile.userId,
            userName: userProfile.displayName,
            score: score,
            isAscending: false,
            extraData: JSON.stringify({
                time: new Date().toISOString(),
                duration: GAME_TIME,
                difficulty,
                difficultyLabel: diffLabelMap[difficulty] || '簡單'
            })
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) renderLeaderboard(result.data);
        } catch (err) {
            console.error('上傳分數失敗', err);
        }
    }

    function renderLeaderboard(data) {
        const list = document.getElementById('rank-list');
        list.innerHTML = data.map(item => `
            <div class="rank-item ${item.userName === userProfile?.displayName ? 'my-rank' : ''}">
                <div class="rank-number">${item.rank}</div>
                <div class="rank-name">${item.userName}</div>
                <div class="rank-score">${item.score} 分</div>
            </div>
        `).join('');
        document.getElementById('leaderboard-section').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    async function shareResult() {
        if (!userProfile) {
            alert('尚未登入 LINE，無法分享。');
            return;
        }

        try {
            if (typeof liff !== 'undefined' && liff.isInClient() && typeof liff.sendMessages === 'function') {
                try {
                    await liff.sendMessages([buildShareFlexMessage()]);
                } catch (flexErr) {
                    console.warn('手動 Flex 失敗，改送文字', flexErr);
                    await liff.sendMessages([{ type: 'text', text: buildShareText() }]);
                }
                showFlowNotice('已手動分享戰績到 LINE。');
                return;
            }
        } catch (err) {
            console.warn('sendMessages 失敗', err);
        }

        try {
            if (typeof liff !== 'undefined' && typeof liff.shareTargetPicker === 'function') {
                let picked;
                try {
                    picked = await liff.shareTargetPicker([buildShareFlexMessage()]);
                } catch (flexErr) {
                    console.warn('shareTargetPicker Flex 失敗，改送文字', flexErr);
                    picked = await liff.shareTargetPicker([{ type: 'text', text: buildShareText() }]);
                }
                if (picked === false) alert('你已取消分享。');
                else showFlowNotice('已手動分享戰績到 LINE。');
                return;
            }
        } catch (err) {
            const detail = err?.message ? `（${err.message}）` : '';
            alert(`手動分享失敗${detail}`);
            return;
        }

        alert('目前環境不支援分享，請在 LINE App 內開啟。');
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            userProfile = await liff.getProfile();
            liffContext = liff.getContext();
            document.getElementById('user-name').innerText = userProfile.displayName;
        } catch (err) {
            console.error('LIFF Init Failed', err);
            document.getElementById('user-name').innerText = '訪客';
        }
        buildGrid();
    }

    initLiff();
</script>
</body>
</html>
